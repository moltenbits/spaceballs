name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Toolchain info
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build --disable-sandbox

      - name: Run tests
        run: swift test --disable-sandbox

      # Release bundling catches plist/signing/layout regressions. The smoke
      # tests stay on ArgumentParser paths because CGS/AX APIs need permissions
      # GitHub-hosted runners cannot grant.
      - name: Release bundle + CLI smoke test
        run: |
          chmod +x scripts/*.sh
          # CI has no distribution credentials, so bundle.sh produces the dev
          # bundle names — the same artifact a local `make bundle-release` makes.
          ./scripts/bundle.sh release
          test -x ".build/release/Spaceballs Dev.app/Contents/MacOS/spaceballs"
          test -x ".build/release/Spaceballs-CLI Dev.app/Contents/MacOS/spaceballs"
          test -f ".build/release/Spaceballs-CLI Dev.app/Contents/Resources/completions/_spaceballs"
          codesign --verify --deep --strict ".build/release/Spaceballs Dev.app"
          codesign --verify --deep --strict ".build/release/Spaceballs-CLI Dev.app"
          ".build/release/Spaceballs-CLI Dev.app/Contents/MacOS/spaceballs" --version
          ".build/release/Spaceballs-CLI Dev.app/Contents/MacOS/spaceballs" --help

  lint:
    name: Lint
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: swift-format lint
        run: xcrun swift-format lint -r Sources/ Tests/
